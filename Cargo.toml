[package]
name = "LitePhoton"
version = "2.0.0"
edition = "2024"
description = "A blazingly fast text file/csv file/etc scanner."
homepage = "https://izom.net"
repository = "https://github.com/IzomSoftware/LitePhoton"
readme = "README.md"
license = "MIT"
publish = true

[lints.clippy]
unwrap_used = "deny"

[dependencies]
clap = { version = "4.6.1", features = ["derive"] }
log = "0.4.29"
log4rs = "1.4.0"
rayon = "1.10.0"
strum = "0.28.0"
strum_macros = "0.28.0"
memmap2 = "0.9.9"
memchr = "2.8.0"
thiserror = "2.0.18"
regex = "1.12.3"

[profile.release]
strip = true
lto = "fat"
opt-level = "z"
codegen-units = 1
panic = "abort"
debug = 0 ## true this only when flamegraph needed / or profiling
